<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mood Shader 🌈</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>Mood Color Shader 🌈</h1>
    <div class="colors">
      <button class="color-btn" data-color="#ff4d6d" data-sound="love.mp3">
        ❤️
      </button>
      <button class="color-btn" data-color="#36a2eb" data-sound="calm.mp3">
        💙
      </button>
      <button class="color-btn" data-color="#ffce56" data-sound="happy.mp3">
        💛
      </button>
    </div>
    <audio id="moodMusic" loop></audio>

    <script src="script.js"></script>
  </body>
</html>
