<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reaction Time Tester</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>⚡ Reaction Time Tester</h1>

        </div>

        <button id="start-btn">Start</button>

        <p id="result"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
